<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#030a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UAP News">
<meta name="description" content="UAP News Nachrichtenmonitor">
<title>UAP News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030a0f;
    --border: #0d3a5c;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --text: #d6e8f0;
    --muted: #668696;
  }
  * { box-sizing: border-box; }
  html { background: var(--bg); scroll-behavior: auto; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% -10%, rgba(0,212,255,.16), transparent 32rem), linear-gradient(180deg, #030a0f 0%, #06111a 60%, #030a0f 100%);
    color: var(--text);
    font-family: 'Exo 2', system-ui, sans-serif;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,.025) 2px, rgba(0,212,255,.025) 4px);
  }
  a { color: inherit; }
  header {
    padding: calc(20px + env(safe-area-inset-top)) 20px 16px;
    border-bottom: 1px solid rgba(13,58,92,.85);
    background: rgba(3,10,15,.76);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .header-inner, main, footer { max-width: 920px; margin: 0 auto; }
  .header-inner { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
  .brand { min-width: 0; }
  .brand-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    color: #eafcff;
    font-size: clamp(28px, 8vw, 46px);
    line-height: .92;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(255,255,255,.65), 0 0 22px rgba(0,212,255,.9), 0 0 44px rgba(0,255,157,.35);
    white-space: nowrap;
  }
  .brand-sub {
    margin-top: 8px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .status {
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
    font-size: 11px;
    text-align: right;
    line-height: 1.6;
    flex: 0 0 auto;
  }
  .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    margin-right: 7px;
  }
  main { padding: 20px 18px 52px; }
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    border-bottom: 1px solid rgba(13,58,92,.65);
    padding-bottom: 12px;
  }
  .feed-title {
    font-family: 'Rajdhani', sans-serif;
    color: var(--muted);
    letter-spacing: 3px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .button-row { display: flex; gap: 8px; align-items: center; }
  button.icon-btn {
    min-width: 38px;
    height: 38px;
    border: 1px solid rgba(0,212,255,.32);
    color: var(--accent);
    background: rgba(0,212,255,.045);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  #feed { display: flex; flex-direction: column; gap: 12px; overflow-anchor: none; }
  .article-card {
    border: 1px solid rgba(13,58,92,.95);
    background: linear-gradient(180deg, rgba(8,20,32,.98), rgba(5,15,23,.98));
    position: relative;
    overflow: hidden;
  }
  .article-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    background: var(--accent);
    opacity: .74;
  }
  .badge {
    border: 1px solid rgba(90,122,138,.55);
    color: #91aebb;
    padding: 2px 7px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.3px;
    text-transform: uppercase;
  }
  footer {
    color: rgba(102,134,150,.72);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    text-align: center;
    padding: 20px 18px 32px;
    border-top: 1px solid rgba(13,58,92,.65);
  }
  #loading {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    background: #030a0f;
    transition: opacity .28s ease, visibility .28s ease;
    animation: cssStartFallback 9.4s forwards;
  }
  #loading.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  @keyframes cssStartFallback { 0%, 96% { opacity: 1; visibility: visible; pointer-events: auto; } 100% { opacity: 0; visibility: hidden; pointer-events: none; } }
  .startup-title {
    display: inline-block;
    position: absolute;
    top: calc(8px + env(safe-area-inset-top));
    left: 4px;
    margin: 0;
    color: #eafcff;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(72px,22vw,136px);
    line-height: .82;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(255,255,255,.65), 0 0 22px rgba(0,212,255,.9), 0 0 44px rgba(0,255,157,.35);
    white-space: nowrap;
    z-index: 2;
  }
  .startup-title::after {
    content: '';
    position: absolute;
    left: 1px;
    right: 0;
    bottom: -7px;
    height: 2px;
    background: linear-gradient(90deg, #00d4ff, #00ff9d, transparent);
    box-shadow: 0 0 18px rgba(0,212,255,.95);
  }
  .startup-credit {
    position: absolute;
    top: calc(10px + env(safe-area-inset-top) + clamp(86px,23vw,150px));
    left: 8px;
    color: #c6f4ff;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px,2.5vw,12px);
    letter-spacing: 1.8px;
    text-shadow: 0 0 6px rgba(255,255,255,.45), 0 0 16px rgba(0,212,255,.75);
    z-index: 2;
  }
  .alien-head {
    width: min(340px, 84vw);
    aspect-ratio: 1 / 1.16;
    border-radius: 48% 48% 42% 42% / 58% 58% 38% 38%;
    background: radial-gradient(ellipse at 50% 24%, rgba(170,255,240,.2), transparent 34%), linear-gradient(160deg, rgba(0,212,255,.12), rgba(0,255,157,.05));
    border: 1px solid rgba(0,212,255,.16);
    box-shadow: inset 0 0 60px rgba(0,212,255,.12), 0 0 34px rgba(0,212,255,.42), 0 0 80px rgba(0,255,157,.18);
    opacity: .68;
    position: relative;
    animation: uapAlienSteadyZoom 13s linear infinite;
    will-change: transform, opacity;
    transform-origin: center center;
  }
  .alien-head::before, .alien-head::after {
    content: '';
    position: absolute;
    top: 35%;
    width: 28%;
    height: 18%;
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 50%, rgba(214,255,246,.9), rgba(0,255,157,.34) 42%, rgba(0,0,0,.25) 72%);
    box-shadow: 0 0 22px rgba(0,255,157,.6);
  }
  .alien-head::before { left: 17%; transform: rotate(18deg); }
  .alien-head::after { right: 17%; transform: rotate(-18deg); }
  .loading-bar {
    position: absolute;
    left: 50%;
    bottom: 22px;
    width: 200px;
    height: 2px;
    transform: translateX(-50%);
    background: var(--border);
    overflow: hidden;
  }
  .loading-bar::after {
    content: '';
    position: absolute;
    top: 0;
    left: -60%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: loadingSlide 1.5s linear infinite;
  }
  @keyframes loadingSlide { from { left: -60%; } to { left: 100%; } }
  @keyframes uapAlienSteadyZoom { 0% { opacity: .5; transform: translate3d(0,0,0) scale(.86); } 50% { opacity: .76; transform: translate3d(0,-1px,0) scale(1.08); } 100% { opacity: .9; transform: translate3d(0,0,0) scale(1.22); } }
  @media (max-width: 560px) {
    header { padding-left: 16px; padding-right: 16px; }
    .header-inner { align-items: flex-start; }
    .status { font-size: 8px; }
    main { padding-left: 12px; padding-right: 12px; }
    .brand-title { font-size: clamp(27px,10vw,39px); letter-spacing: 1px; }
    .startup-title { top: calc(7px + env(safe-area-inset-top)); left: 3px; font-size: clamp(64px,22vw,104px); letter-spacing: 1px; }
    .startup-credit { top: calc(8px + env(safe-area-inset-top) + clamp(76px,23vw,116px)); left: 6px; letter-spacing: 1.3px; }
  }
</style>
</head>
<body>
<div id="loading" aria-live="polite">
  <h1 class="startup-title">UAP News</h1>
  <div class="startup-credit">created by Chris Gehring</div>
  <div class="alien-head" aria-hidden="true"></div>
  <div class="loading-bar"></div>
</div>
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-title">UAP News</div>
      <div class="brand-sub">Nachrichtenmonitor</div>
    </div>
    <div class="status">
      <div><span class="dot"></span>ONLINE</div>
      <div id="last-scan">Scan: lade...</div>
    </div>
  </div>
</header>
<main>
  <div class="toolbar">
    <div>
      <div class="feed-title">Aktuelle Themen</div>
      <div class="meta" id="feed-meta"></div>
    </div>
    <div class="button-row">
      <button class="icon-btn" id="refresh-btn" type="button" title="Aktualisieren">↻</button>
    </div>
  </div>
  <section id="feed" aria-live="polite"></section>
</main>
<footer>UAP News · Datenquelle: GitHub latest-news.json</footer>
<script src="./uap-feed-normalize.js?v=117"></script>
<script src="./uap-app-overrides.js?v=117"></script>
<script>
(function(){
  function hideStart(){
    var loading = document.getElementById('loading');
    if (loading) loading.classList.add('hidden');
  }
  var refresh = document.getElementById('refresh-btn');
  if (refresh) refresh.addEventListener('click', function(){ window.location.reload(); });
  window.addEventListener('load', function(){ setTimeout(hideStart, 1200); });
  setTimeout(hideStart, 9400);
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});
})();
</script>
</body>
</html>
