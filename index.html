<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#030a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UAP NEWS">
<meta name="description" content="UAP und UFO Nachrichtenmonitoring">
<title>UAP SIGNAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030a0f;
    --bg2: #06111a;
    --panel: #081420;
    --panel2: #0b1d2e;
    --border: #0d3a5c;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --text: #d6e8f0;
    --muted: #668696;
  }
  * { box-sizing: border-box; }
  html { background: var(--bg); }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 50% -10%, rgba(0,212,255,.16), transparent 32rem),
      linear-gradient(180deg, #030a0f 0%, #06111a 60%, #030a0f 100%);
    color: var(--text);
    font-family: 'Exo 2', system-ui, sans-serif;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,.025) 2px, rgba(0,212,255,.025) 4px);
  }
  a { color: inherit; }
  header {
    padding: calc(20px + env(safe-area-inset-top)) 20px 16px;
    border-bottom: 1px solid rgba(13,58,92,.85);
    background: rgba(3,10,15,.76);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(14px);
  }
  .header-inner, main, footer { max-width: 920px; margin: 0 auto; }
  .header-inner { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
  .brand { min-width: 0; }
  .brand-title {
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 5px;
    color: var(--accent);
    font-size: clamp(20px, 6vw, 28px);
    text-shadow: 0 0 22px rgba(0,212,255,.55);
    white-space: nowrap;
  }
  .brand-sub {
    margin-top: 4px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .status {
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
    font-size: 11px;
    text-align: right;
    line-height: 1.6;
    flex: 0 0 auto;
  }
  .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    margin-right: 7px;
  }
  main { padding: 20px 18px 52px; }
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    border-bottom: 1px solid rgba(13,58,92,.65);
    padding-bottom: 12px;
  }
  .feed-title {
    font-family: 'Rajdhani', sans-serif;
    color: var(--muted);
    letter-spacing: 3px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .button-row { display: flex; gap: 8px; align-items: center; }
  button.icon-btn, a.icon-btn {
    min-width: 38px;
    height: 38px;
    border: 1px solid rgba(0,212,255,.32);
    color: var(--accent);
    background: rgba(0,212,255,.045);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  button.icon-btn:active { transform: translateY(1px); }
  .notice {
    display: none;
    margin-bottom: 14px;
    padding: 12px 14px;
    border: 1px solid rgba(255,107,53,.45);
    color: #ffc4ad;
    background: rgba(255,107,53,.08);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    line-height: 1.55;
  }
  .notice.show { display: block; }
  #feed { display: flex; flex-direction: column; gap: 12px; }
  .article-card {
    border: 1px solid rgba(13,58,92,.95);
    background: linear-gradient(180deg, rgba(8,20,32,.98), rgba(5,15,23,.98));
    position: relative;
    overflow: hidden;
  }
  .article-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    background: var(--accent);
    opacity: .74;
  }
  .article-main {
    width: 100%;
    text-align: left;
    border: 0;
    background: transparent;
    color: inherit;
    padding: 14px 16px 12px 18px;
    cursor: pointer;
  }
  .badges { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 8px; }
  .badge {
    border: 1px solid rgba(90,122,138,.55);
    color: #91aebb;
    padding: 2px 7px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.3px;
    text-transform: uppercase;
  }
  .badge.sources { color: var(--accent2); border-color: rgba(0,255,157,.42); background: rgba(0,255,157,.055); }
  .badge.quality { color: var(--accent); border-color: rgba(0,212,255,.42); background: rgba(0,212,255,.055); }
  h2 {
    margin: 0;
    color: #eef9fd;
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(17px, 4.8vw, 22px);
    line-height: 1.22;
    letter-spacing: 0;
  }
  .meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 9px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
  }
  .summary {
    padding: 0 16px 14px 18px;
    color: #9db6c2;
    font-size: 13px;
    line-height: 1.55;
  }
  .details {
    display: none;
    border-top: 1px solid rgba(13,58,92,.72);
    background: rgba(3,10,15,.46);
    padding: 14px 16px 16px 18px;
  }
  .article-card.open .details { display: block; }
  .sources-title {
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 9px;
  }
  .source-list { display: grid; gap: 8px; }
  .source-link {
    display: block;
    border: 1px solid rgba(13,58,92,.72);
    background: rgba(0,212,255,.035);
    padding: 9px 10px;
    text-decoration: none;
  }
  .source-name {
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.2px;
  }
  .source-headline {
    margin-top: 4px;
    color: #9db6c2;
    font-size: 12px;
    line-height: 1.4;
  }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .action-link, .translate-btn {
    border: 1px solid rgba(0,212,255,.35);
    color: var(--accent);
    background: transparent;
    padding: 8px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-decoration: none;
    cursor: pointer;
  }
  .translation {
    display: none;
    margin-top: 12px;
    padding: 11px 12px;
    border: 1px solid rgba(0,255,157,.25);
    background: rgba(0,255,157,.045);
    color: #b5f5d4;
    font-size: 13px;
    line-height: 1.55;
  }
  .empty {
    display: none;
    color: var(--muted);
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 44px 12px;
    border: 1px solid rgba(13,58,92,.65);
    background: rgba(8,20,32,.75);
  }
  .empty.show { display: block; }
  footer {
    color: rgba(102,134,150,.72);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    text-align: center;
    padding: 20px 18px 32px;
    border-top: 1px solid rgba(13,58,92,.65);
  }
  #loading {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    background: rgba(3,10,15,.98);
    transition: opacity .28s ease, visibility .28s ease;
    animation: cssStartFallback 9.4s forwards;
  }
  #loading.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  @keyframes cssStartFallback {
    0%, 96% { opacity: 1; visibility: visible; pointer-events: auto; }
    100% { opacity: 0; visibility: hidden; pointer-events: none; }
  }
  .alien {
    width: min(360px, 78vw);
    aspect-ratio: 1;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 38% 42%, rgba(0,212,255,.9) 0 5%, transparent 6%),
      radial-gradient(ellipse at 62% 42%, rgba(0,212,255,.9) 0 5%, transparent 6%),
      radial-gradient(ellipse at 50% 50%, rgba(0,212,255,.2), transparent 64%);
    border: 1px solid rgba(0,212,255,.18);
    box-shadow: 0 0 70px rgba(0,212,255,.24), inset 0 0 80px rgba(0,255,157,.08);
    filter: drop-shadow(0 0 32px rgba(0,212,255,.55));
    animation: pulseAlien 5s ease-in-out infinite;
  }
  @keyframes pulseAlien { 50% { transform: scale(1.08); opacity: .8; } }
  .loading-text {
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 4px;
    font-size: 13px;
  }
  .loading-sub {
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
    font-size: 10px;
  }
  @media (max-width: 560px) {
    header { padding-left: 16px; padding-right: 16px; }
    .header-inner { align-items: flex-start; }
    .status { font-size: 9px; }
    main { padding-left: 12px; padding-right: 12px; }
    .brand-title { letter-spacing: 3px; }
  }
</style>
</head>
<body>
<div id="loading" aria-live="polite">
  <div class="alien" aria-hidden="true"></div>
  <div class="loading-text">SIGNAL WIRD KALIBRIERT</div>
  <div class="loading-sub">GitHub-Feed wird geladen</div>
</div>
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-title">UAP SIGNAL</div>
      <div class="brand-sub">Nachrichtenmonitor</div>
    </div>
    <div class="status">
      <div><span class="dot"></span>ONLINE</div>
      <div id="last-scan">Scan: lade...</div>
    </div>
  </div>
</header>
<main>
  <div class="toolbar">
    <div>
      <div class="feed-title">Aktuelle Themen</div>
      <div class="meta" id="feed-meta">Warte auf GitHub-Feed</div>
    </div>
    <div class="button-row">
      <button class="icon-btn" id="refresh-btn" title="Aktualisieren">↻</button>
      <a class="icon-btn" href="latest-news.json" title="Rohdaten">{ }</a>
    </div>
  </div>
  <div class="notice" id="notice"></div>
  <section id="feed" aria-live="polite"></section>
  <div class="empty" id="empty">Noch keine Artikel geladen. Bitte kurz erneut aktualisieren.</div>
</main>
<footer>UAP NEWS · Datenquelle: GitHub latest-news.json</footer>
<script>
(function() {
  'use strict';
  var START_MS = 9000;
  var started = Date.now();
  var feedEl = document.getElementById('feed');
  var emptyEl = document.getElementById('empty');
  var noticeEl = document.getElementById('notice');
  var metaEl = document.getElementById('feed-meta');
  var lastScanEl = document.getElementById('last-scan');
  var loadingEl = document.getElementById('loading');
  var articles = [];

  function hideStart() {
    if (loadingEl) loadingEl.classList.add('hidden');
  }
  setTimeout(hideStart, START_MS);
  window.addEventListener('error', function() { setTimeout(hideStart, Math.max(0, START_MS - (Date.now() - started))); });
  window.addEventListener('unhandledrejection', function() { setTimeout(hideStart, Math.max(0, START_MS - (Date.now() - started))); });

  function esc(value) {
    return String(value == null ? '' : value).replace(/[&<>"]/g, function(ch) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch];
    });
  }
  function topicId(title) {
    return String(title || '').toLowerCase().replace(/[^a-z0-9]/g, ' ').trim().split(/\s+/).filter(function(w) { return w.length > 3; }).sort().join('-') || 'topic';
  }
  function cleanSummary(summary, title) {
    var text = String(summary || '').replace(/&nbsp;/g, ' ').replace(/\s+/g, ' ').trim();
    if (!text || text === title || text.length < 45) return '';
    return text;
  }
  function fmtDate(value) {
    if (!value) return '';
    var d = new Date(value);
    if (isNaN(d.getTime())) return String(value).slice(0, 10);
    return d.toLocaleDateString('de-AT', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }
  function allSources(article) {
    var list = [{ source: article.source || 'UAP News', link: article.link || article.url || '', title: article.title || '' }];
    (article.otherSources || article._otherSources || []).forEach(function(s) {
      list.push({ source: s.source || 'UAP News', link: s.link || s.url || '', title: s.title || '' });
    });
    var seen = {};
    return list.filter(function(s) {
      var key = String(s.source || '').toLowerCase() + '|' + String(s.link || '').toLowerCase();
      if (seen[key]) return false;
      seen[key] = true;
      return true;
    });
  }
  function mapArticle(raw, summaries) {
    var title = String(raw.title || '').trim();
    var id = raw.id || topicId(title);
    var summary = cleanSummary((summaries && (summaries[id] || summaries[topicId(title)])) || raw.summary || raw.description || '', title);
    return {
      id: id,
      title: title,
      source: raw.source || 'UAP News',
      link: raw.link || raw.url || '',
      date: raw.date || '',
      summary: summary,
      mentions: raw.mentions || Math.max(1, allSources(raw).length),
      otherSources: raw.otherSources || raw._otherSources || [],
      quality: raw.quality || raw._quality || 0,
      matchedTerms: raw.matchedTerms || raw._matchedTerms || []
    };
  }
  function setNotice(text) {
    if (!noticeEl) return;
    noticeEl.textContent = text || '';
    noticeEl.classList.toggle('show', !!text);
  }
  function setMeta(data) {
    if (metaEl) {
      var count = articles.length;
      var raw = data && data.scanMeta && data.scanMeta.broadArticles ? data.scanMeta.broadArticles : '';
      metaEl.textContent = count + ' Themen' + (raw ? ' aus ' + raw + ' Fundstellen' : '');
    }
    if (lastScanEl && data && data.timestamp) lastScanEl.textContent = 'Scan: ' + fmtDate(data.timestamp);
  }
  function render() {
    if (!feedEl) return;
    feedEl.innerHTML = '';
    if (!articles.length) {
      if (emptyEl) emptyEl.classList.add('show');
      return;
    }
    if (emptyEl) emptyEl.classList.remove('show');
    articles.forEach(function(article, index) {
      var sources = allSources(article);
      var terms = (article.matchedTerms || []).slice(0, 4).map(function(t) { return '<span class="badge">' + esc(t) + '</span>'; }).join('');
      var sourceLinks = sources.map(function(s) {
        var title = s.title && s.title !== article.title ? '<div class="source-headline">' + esc(s.title) + '</div>' : '';
        var inner = '<div class="source-name">' + esc(s.source || 'Quelle') + '</div>' + title;
        return s.link ? '<a class="source-link" href="' + esc(s.link) + '" target="_blank" rel="noopener noreferrer">' + inner + '</a>' : '<div class="source-link">' + inner + '</div>';
      }).join('');
      var summary = article.summary ? '<div class="summary" id="summary-' + esc(article.id) + '">' + esc(article.summary) + '</div>' : '<div class="summary" id="summary-' + esc(article.id) + '">Keine belastbare Zusammenfassung vorhanden.</div>';
      var card = document.createElement('article');
      card.className = 'article-card';
      card.innerHTML =
        '<button class="article-main" type="button" data-index="' + index + '">' +
          '<div class="badges"><span class="badge sources">' + sources.length + ' Quellen</span><span class="badge quality">Q ' + esc(article.quality || '-') + '</span>' + terms + '</div>' +
          '<h2>' + esc(article.title) + '</h2>' +
          '<div class="meta"><span>' + esc(article.source) + '</span><span>' + esc(fmtDate(article.date)) + '</span></div>' +
        '</button>' + summary +
        '<div class="details">' +
          '<div class="sources-title">Quellen</div>' +
          '<div class="source-list">' + sourceLinks + '</div>' +
          '<div class="actions">' +
            (article.link ? '<a class="action-link" href="' + esc(article.link) + '" target="_blank" rel="noopener noreferrer">Artikel öffnen</a>' : '') +
            '<button class="translate-btn" type="button" data-translate="' + index + '">Übersetzen</button>' +
          '</div>' +
          '<div class="translation" id="translation-' + index + '"></div>' +
        '</div>';
      feedEl.appendChild(card);
    });
  }
  function loadFeed() {
    setNotice('');
    if (metaEl) metaEl.textContent = 'Lade GitHub-Feed...';
    return fetch('./latest-news.json?_=' + Date.now(), { cache: 'no-store' })
      .then(function(resp) {
        if (!resp.ok) throw new Error('Feed nicht erreichbar');
        return resp.json();
      })
      .then(function(data) {
        articles = (data.articles || data.topics || []).map(function(a) { return mapArticle(a, data.summaries || {}); }).filter(function(a) { return a.title; }).slice(0, 12);
        try { localStorage.setItem('uap_feed_cache_v2', JSON.stringify({ timestamp: data.timestamp, articles: articles })); } catch(e) {}
        render();
        setMeta(data);
        return articles;
      })
      .catch(function(err) {
        try {
          var cached = JSON.parse(localStorage.getItem('uap_feed_cache_v2') || '{}');
          if (cached.articles && cached.articles.length) {
            articles = cached.articles;
            render();
            if (metaEl) metaEl.textContent = articles.length + ' Themen aus lokalem Zwischenspeicher';
            setNotice('Online-Feed war gerade nicht erreichbar, daher wird der letzte gespeicherte Stand angezeigt.');
            return articles;
          }
        } catch(e) {}
        articles = [];
        render();
        if (metaEl) metaEl.textContent = 'Keine Themen geladen';
        setNotice('Der GitHub-Feed konnte gerade nicht geladen werden. Bitte aktualisieren.');
        return [];
      });
  }
  function translateText(text, target) {
    var url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=' + encodeURIComponent(target || 'de') + '&dt=t&q=' + encodeURIComponent(text || '');
    return fetch(url).then(function(r) { return r.json(); }).then(function(data) {
      return (data && data[0] ? data[0].map(function(part) { return part[0]; }).join('') : '').trim();
    });
  }

  document.addEventListener('click', function(e) {
    var main = e.target.closest && e.target.closest('.article-main');
    if (main) {
      var card = main.closest('.article-card');
      if (card) card.classList.toggle('open');
      return;
    }
    var translate = e.target.closest && e.target.closest('[data-translate]');
    if (translate) {
      var index = Number(translate.getAttribute('data-translate'));
      var article = articles[index];
      var box = document.getElementById('translation-' + index);
      if (!article || !box) return;
      box.style.display = 'block';
      box.textContent = 'Übersetzung läuft...';
      translate.disabled = true;
      translateText((article.title || '') + '\n\n' + (article.summary || ''), 'de')
        .then(function(text) { box.textContent = text || 'Keine Übersetzung erhalten.'; })
        .catch(function() { box.textContent = 'Übersetzung fehlgeschlagen. Bitte erneut versuchen.'; })
        .finally(function() { translate.disabled = false; });
    }
  });
  document.getElementById('refresh-btn').addEventListener('click', loadFeed);

  loadFeed().finally(function() {
    var remaining = Math.max(0, START_MS - (Date.now() - started));
    setTimeout(hideStart, remaining);
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  }
})();
</script>
</body>
</html>
