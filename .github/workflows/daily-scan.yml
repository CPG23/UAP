name: Daily UAP Scan & Notify

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/scripts/daily_scan.py
      - .github/scripts/split_unrelated_sources.py
      - .github/scripts/enrich_summaries.py
      - .github/scripts/sync_summaries.py
      - .github/scripts/source_quality_adjust.py
      - .github/scripts/regroup_topics.py
      - .github/scripts/normalize_feed_clusters.py
      - .github/scripts/dedupe_feed_titles.py
      - .github/scripts/balance_feed_quality.py
      - .github/scripts/repair_article_summaries.py
      - .github/scripts/summary_quality_gate.py
      - .github/scripts/finalize_app_feed.py
      - .github/scripts/precompute_translations.py
      - .github/scripts/prepare_ntfy_payload.py
      - .github/workflows/daily-scan.yml

permissions:
  contents: write

concurrency:
  group: daily-uap-scan-main
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install article extraction dependencies
        run: |
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet googlenewsdecoder==0.1.7 trafilatura==1.12.2

      - name: Restore seen-IDs cache
        uses: actions/cache@v4
        with:
          path: .seen-ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: |
            seen-ids-

      - name: Scan UAP news and prepare exact notification payload
        env:
          NTFY_TOPIC: UAP-News26
        run: |
          echo "Running refreshed UAP scan with article-content summary gate"
          echo "Manual refresh trigger: 2026-05-14T00:00:00+02:00"
          python3 .github/scripts/daily_scan.py
          python3 .github/scripts/split_unrelated_sources.py
          python3 .github/scripts/enrich_summaries.py
          python3 .github/scripts/sync_summaries.py
          python3 .github/scripts/source_quality_adjust.py
          python3 .github/scripts/regroup_topics.py
          python3 .github/scripts/normalize_feed_clusters.py
          python3 .github/scripts/dedupe_feed_titles.py
          python3 .github/scripts/balance_feed_quality.py
          python3 .github/scripts/repair_article_summaries.py
          python3 .github/scripts/summary_quality_gate.py
          python3 .github/scripts/finalize_app_feed.py
          python3 .github/scripts/precompute_translations.py
          python3 .github/scripts/prepare_ntfy_payload.py

      - name: Publish latest-news.json
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp latest-news.json /tmp/latest-news.json
          cp .seen-ids.json /tmp/.seen-ids.json 2>/dev/null || true
          cp ntfy-payload.json /tmp/ntfy-payload.json 2>/dev/null || true
          for attempt in 1 2 3; do
            echo "Publish attempt $attempt"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/latest-news.json latest-news.json
            cp /tmp/.seen-ids.json .seen-ids.json 2>/dev/null || true
            cp /tmp/ntfy-payload.json ntfy-payload.json 2>/dev/null || rm -f ntfy-payload.json
            git add latest-news.json .seen-ids.json ntfy-payload.json
            if git diff --staged --quiet; then
              echo "No changes."
              exit 0
            fi
            git commit -m "chore: update latest-news.json"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed, retrying after remote update..."
            sleep $((attempt * 5))
          done
          echo "Could not publish latest-news.json after retries."
          exit 1

      - name: Send push notification after publish
        if: ${{ hashFiles('ntfy-payload.json') != '' }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request
          with open('ntfy-payload.json', encoding='utf-8') as f:
              payload = json.load(f)
          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(
              'https://ntfy.sh',
              data=data,
              headers={'Content-Type': 'application/json', 'User-Agent': 'UAP-News-Bot/1.0'},
              method='POST',
          )
          with urllib.request.urlopen(req, timeout=15) as r:
              print(f'Notification sent after publish (HTTP {r.status})')
          PYEOF
