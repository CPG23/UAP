<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#030a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UAP News">
<meta name="description" content="UAP News Nachrichtenmonitor">
<title>UAP News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030a0f;
    --border: #0d3a5c;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --text: #d6e8f0;
    --muted: #668696;
  }
  * { box-sizing: border-box; }
  html { background: var(--bg); scroll-behavior: auto; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% -10%, rgba(0,212,255,.16), transparent 32rem), linear-gradient(180deg, #030a0f 0%, #06111a 60%, #030a0f 100%);
    color: var(--text);
    font-family: 'Exo 2', system-ui, sans-serif;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,.025) 2px, rgba(0,212,255,.025) 4px);
  }
  a { color: inherit; }
  #loading {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: block;
    background: #02070b;
    overflow: hidden;
    animation: uapStartupHide 5s forwards;
  }
  #loading.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  @keyframes uapStartupHide {
    0%, 94% { opacity: 1; visibility: visible; pointer-events: auto; }
    100% { opacity: 0; visibility: hidden; pointer-events: none; }
  }
  header {
    padding: 0;
    border-bottom: 1px solid rgba(0,212,255,.42);
    background: #000;
    position: sticky;
    top: 0;
    z-index: 10;
    overflow: hidden;
  }
  .header-inner { display: block; width: 100%; max-width: none; margin: 0; padding: 0; }
  .brand { display: block; width: 100%; min-width: 0; margin: 0; padding: 0; }
  .brand-title {
    display: block;
    width: 100vw;
    height: 31vw;
    min-height: 118px;
    max-height: 210px;
    margin: 0;
    padding: 0;
    line-height: 0;
    overflow: hidden;
    background: #000;
    color: transparent;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
  }
  .brand-sub, .status { display: none; }
  main { max-width: 920px; margin: 0 auto; padding: 16px 18px 52px; }
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    border-bottom: 1px solid rgba(13,58,92,.65);
    padding-bottom: 12px;
  }
  .feed-title {
    font-family: 'Rajdhani', sans-serif;
    color: var(--muted);
    letter-spacing: 3px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .meta { color: var(--muted); font-size: 11px; }
  .button-row { display: flex; gap: 8px; align-items: center; }
  button.icon-btn {
    min-width: 38px;
    height: 38px;
    border: 1px solid rgba(0,212,255,.32);
    color: var(--accent);
    background: rgba(0,212,255,.045);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  #feed { display: flex; flex-direction: column; gap: 12px; overflow-anchor: none; }
  .article-card {
    border: 1px solid rgba(13,58,92,.95);
    background: linear-gradient(180deg, rgba(8,20,32,.98), rgba(5,15,23,.98));
    position: relative;
    overflow: hidden;
  }
  .article-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    background: var(--accent);
    opacity: .74;
  }
  .badge {
    border: 1px solid rgba(90,122,138,.55);
    color: #91aebb;
    padding: 2px 7px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.3px;
    text-transform: uppercase;
  }
  footer {
    max-width: 920px;
    margin: 0 auto;
    color: rgba(102,134,150,.72);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    text-align: center;
    padding: 20px 18px 32px;
    border-top: 1px solid rgba(13,58,92,.65);
  }
  @media (max-width: 560px) {
    main { padding-left: 12px; padding-right: 12px; }
    .brand-title { height: 34vw; min-height: 120px; max-height: 184px; }
  }
</style>
<script src="./uap-startscreen-wallpaper.js?v=201"></script>
<script src="./uap-visual-final-fix.js?v=201"></script>
</head>
<body>
<div id="loading" aria-hidden="true"></div>
<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-title" aria-label="UAP News"></div>
    </div>
  </div>
</header>
<main>
  <div class="toolbar">
    <div>
      <div class="feed-title">Aktuelle Themen</div>
      <div class="meta" id="feed-meta"></div>
    </div>
    <div class="button-row">
      <button class="icon-btn" id="refresh-btn" type="button" title="Aktualisieren">↻</button>
    </div>
  </div>
  <section id="feed" aria-live="polite"></section>
</main>
<footer>UAP News · Datenquelle: GitHub latest-news.json</footer>
<script src="./uap-feed-normalize.js?v=201"></script>
<script src="./uap-app-overrides.js?v=201"></script>
<script src="./uap-header-retry-fix.js?v=201"></script>
<script src="./uap-final-stability-fix.js?v=201"></script>
<script>
(function(){
  function hideStart(){
    var loading = document.getElementById('loading');
    if (loading) loading.classList.add('hidden');
  }
  var refresh = document.getElementById('refresh-btn');
  if (refresh) refresh.addEventListener('click', function(){ window.location.reload(); });
  window.addEventListener('load', function(){ setTimeout(hideStart, 5000); });
  setTimeout(hideStart, 5200);
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js?v=201').catch(function(){});
})();
</script>
</body>
</html>
