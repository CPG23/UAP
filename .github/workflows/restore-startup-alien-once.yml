name: Restore startup alien once

on:
  push:
    paths:
      - '.github/workflows/restore-startup-alien-once.yml'
      - '.github/scripts/restore-startup-alien.js'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: restore-startup-alien-once-main
  cancel-in-progress: true

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore old startup alien
        run: node .github/scripts/restore-startup-alien.js
      - name: Publish startup update
        run: |
          if git diff --quiet -- index.html; then
            echo "No startup changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "fix: restore original startup alien animation"
          git pull --rebase origin main
          git push origin HEAD:main
