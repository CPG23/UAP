name: Daily UAP Scan & Notify

on:
  schedule:
    - cron: '0 3 * * *'   # target 07:00 MESZ, shifted for GitHub schedule delay
    - cron: '0 11 * * *'  # afternoon refresh
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-uap-scan-main
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore seen-IDs cache
        uses: actions/cache@v4
        with:
          path: .seen-ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: |
            seen-ids-

      - name: Scan UAP news, group topics, generate grounded summaries & send ntfy notification
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, time, urllib.request, urllib.parse
          from datetime import datetime, timedelta, timezone
          from email.utils import parsedate_to_datetime
          from xml.etree import ElementTree as ET

          NTFY_TOPIC = os.environ.get('NTFY_TOPIC', '').strip()
          if not NTFY_TOPIC:
              print('NTFY_TOPIC not set - scan will run without notification.')

          SEEN_FILE = '.seen-ids.json'
          try:
              with open(SEEN_FILE) as f:
                  notified_ids = set(json.load(f))
              print(f'Loaded seen IDs: {len(notified_ids)}')
          except Exception:
              notified_ids = set()
              print('No seen IDs yet.')

          UAP_RE = re.compile(
              r'\b(uap|ufo|ufos|uaps|unidentified anomalous|unidentified aerial|'
              r'aerial phenomenon|aerial phenomena|flying saucer|extraterrestrial|'
              r'disclosure|whistleblower|pentagon|aaro|dod|congress|crash.?retrieval|'
              r'nonhuman|non.human|sighting|sightings|orb|orbs|usos?)\b', re.I)

          AUTHORITATIVE_RE = re.compile(
              r'\b(pentagon|aaro|dod|nasa|congress|senate|hearing|classified|declassified|'
              r'whistleblower|military|navy|air force|pilot|radar|faa|foia|government|'
              r'disclosure|crash.?retrieval|nonhuman|non.human|sighting|sightings)\b', re.I)

          NEGATIVE_RE = re.compile(
              r'\b(movie|film|trailer|teaser|episode|season|series|netflix|hulu|prime video|'
              r'disney|review|recap|spoiler|streaming|box office|actor|actress|anime|manga|'
              r'comic|marvel|star wars|doctor who|alienware|gaming|gameplay|video game|'
              r'fortnite|roblox|minecraft|no man.?s sky|pokemon|lego|toy|album|song|lyrics|'
              r'horoscope|zodiac|astrology|restaurant|menu|sports|nfl|nba|mlb|ufc)\b', re.I)

          STORY_STOP = set('''
              a an the to of for in on at by with from and or is are was were be been has have had
              will would could should may might do does did new latest update report reports news says said
              about into after before over under this that these those what how why very uap ufo ufos uaps
          '''.split())

          STORY_TERMS = set('''
              trump biden obama pope popes pastor pastors vatican catholic church america american
              congress senate pentagon nasa aaro dod cia fbi disclosure classified declassified
              whistleblower retrieval crash nonhuman alien aliens extraterrestrial sighting sightings
              pilot radar navy military hearing government foia orb orbs
          '''.split())

          def words_for(text):
              words = re.sub(r'[^a-z0-9]', ' ', (text or '').lower()).split()
              return [w for w in words if len(w) > 2 and w not in STORY_STOP]

          def topic_id(title):
              words = sorted(set(words_for(title)))
              return '-'.join(words[:8]) or 'untitled'

          def quality_score(article):
              text = ' '.join([article.get('title', ''), article.get('description', ''), article.get('source', '')])
              title = article.get('title', '')
              if not UAP_RE.search(text):
                  return 0
              if NEGATIVE_RE.search(text) and not AUTHORITATIVE_RE.search(text):
                  return 0
              score = 1
              if AUTHORITATIVE_RE.search(text):
                  score += 2
              if re.search(r'\b(uap|ufo|ufos|uaps)\b', title, re.I):
                  score += 1
              if re.search(r'\b(pentagon|aaro|nasa|congress|senate|whistleblower|disclosure|sighting)\b', title, re.I):
                  score += 1
              if article.get('link'):
                  score += 1
              return score

          def is_relevant(article):
              return quality_score(article) >= 2

          def story_key(article):
              combined = ' '.join([article.get('title', ''), article.get('description', ''), article.get('summary', '')])
              words = words_for(combined)
              boosted = [w for w in words if w in STORY_TERMS]
              plain = [w for w in words if w not in STORY_TERMS]
              return '-'.join(sorted(set(boosted + plain))[:10]) or topic_id(article.get('title', ''))

          def similarity(a, b):
              aw = set(words_for(' '.join([a.get('title', ''), a.get('description', ''), a.get('summary', '')])))
              bw = set(words_for(' '.join([b.get('title', ''), b.get('description', ''), b.get('summary', '')])))
              if not aw or not bw:
                  return 0
              overlap = len(aw & bw) / min(len(aw), len(bw))
              shared_terms = len((aw & bw) & STORY_TERMS)
              return min(1, overlap + (0.08 * shared_terms))

          def better_primary(current, candidate):
              return quality_score(candidate) > quality_score(current)

          def group_articles(articles):
              groups = []
              for article in articles:
                  best_i, best_score = -1, 0
                  for i, group in enumerate(groups):
                      score = similarity(article, group['primary'])
                      if score > best_score:
                          best_i, best_score = i, score
                  if best_i >= 0 and best_score >= 0.34:
                      if better_primary(groups[best_i]['primary'], article):
                          old_primary = groups[best_i]['primary']
                          groups[best_i]['primary'] = article
                          groups[best_i]['others'].append(old_primary)
                      else:
                          groups[best_i]['others'].append(article)
                  else:
                      groups.append({'primary': article, 'others': []})

              grouped = []
              for group in groups:
                  primary = dict(group['primary'])
                  sources = []
                  seen_sources = set()
                  for source_article in [primary] + group['others']:
                      source_name = source_article.get('source') or 'UAP News'
                      if source_name in seen_sources:
                          continue
                      seen_sources.add(source_name)
                      sources.append({
                          'source': source_name,
                          'link': source_article.get('link', ''),
                          'title': source_article.get('title', ''),
                      })
                  primary['id'] = story_key(primary)
                  primary['_mentions'] = len(sources)
                  primary['_otherSources'] = sources[1:]
                  primary['_clusterTitles'] = [o.get('title', '') for o in group['others'] if o.get('title')]
                  primary['_quality'] = quality_score(primary)
                  primary['_matchedTerms'] = sorted(set(w for w in words_for(primary.get('title', '') + ' ' + primary.get('description', '')) if w in STORY_TERMS))[:8]
                  grouped.append(primary)
              return sorted(grouped, key=lambda a: (a.get('_mentions', 1), a.get('_quality', 0)), reverse=True)

          def clean_title(t):
              t = re.sub(r'<!\[CDATA\[|\]\]>', '', t or '').strip()
              t = re.sub(r'\s+[-–]\s+\S.{1,45}$', '', t).strip()
              return t

          def fetch_rss(query, cutoff=None):
              results = []
              try:
                  q = urllib.parse.quote(query)
                  url = f'https://news.google.com/rss/search?q={q}&hl=en-US&gl=US&ceid=US:en'
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=20) as r:
                      xml = r.read().decode('utf-8', errors='replace')
                  root = ET.fromstring(xml)
                  for item in root.findall('.//item'):
                      title_el = item.find('title')
                      if title_el is None:
                          continue
                      title = clean_title(title_el.text)
                      if not title:
                          continue
                      if cutoff is not None:
                          pd_el = item.find('pubDate')
                          if pd_el is not None and pd_el.text:
                              try:
                                  pub_dt = parsedate_to_datetime(pd_el.text.strip())
                                  if pub_dt.tzinfo is None:
                                      pub_dt = pub_dt.replace(tzinfo=timezone.utc)
                                  if pub_dt < cutoff:
                                      continue
                              except Exception:
                                  pass
                      src_el = item.find('source')
                      link_el = item.find('link')
                      link = (link_el.get('href') or link_el.text or '').strip() if link_el is not None else ''
                      source = (src_el.text or 'UAP News').strip() if src_el is not None else 'UAP News'
                      desc_el = item.find('description')
                      description = re.sub(r'<[^>]+>', ' ', desc_el.text or '').strip() if desc_el is not None else ''
                      article = {'title': title, 'source': source, 'link': link, 'description': description, 'query': query}
                      if is_relevant(article):
                          results.append(article)
                      else:
                          print(f'Filtered low-quality/non-UAP: {title[:80]}')
              except Exception as e:
                  print(f'RSS error "{query}": {e}')
              return results

          def fetch_article_text(url):
              if not url:
                  return ''
              try:
                  req = urllib.request.Request('https://r.jina.ai/' + url, headers={'User-Agent': 'UAP-News-Bot/1.0'})
                  with urllib.request.urlopen(req, timeout=20) as r:
                      text = r.read(120000).decode('utf-8', errors='replace')
                  text = re.sub(r'(?im)^(title|url source|published time):.*$', '', text)
                  text = re.sub(r'!\[[^\]]*\]\([^)]+\)', '', text)
                  text = re.sub(r'\[([^\]]+)\]\([^)]+\)', r'\1', text)
                  text = re.sub(r'\s+', ' ', text).strip()
                  if len(text) >= 700 and not re.search(r'google news|enable javascript|access denied|just a moment', text, re.I):
                      return text[:8000]
              except Exception:
                  pass
              return ''

          def fetch_og_desc(url):
              if not url or 'news.google.com' in url:
                  return ''
              try:
                  req = urllib.request.Request(url, headers={
                      'User-Agent': 'Mozilla/5.0 (compatible; UAP-Bot/1.0)',
                      'Accept': 'text/html,application/xhtml+xml'
                  })
                  with urllib.request.urlopen(req, timeout=8) as r:
                      html = r.read(80000).decode('utf-8', errors='replace')
                  m = (re.search(r'property=["\']og:description["\'][^>]+content=["\']([^"\']{80,})["\']', html, re.I)
                    or re.search(r'content=["\']([^"\']{80,})["\'][^>]*property=["\']og:description["\']', html, re.I)
                    or re.search(r'name=["\']description["\'][^>]+content=["\']([^"\']{80,})["\']', html, re.I))
                  if m:
                      t = re.sub(r'\s+', ' ', m.group(1)).strip()
                      if len(t) >= 80 and not re.search(r'google news|nachrichten aus aller welt|zusammengetragen', t, re.I):
                          return t[:520]
              except Exception:
                  pass
              return ''

          def ai_summarize_article(title, article_text, source_count):
              if not article_text or len(article_text) < 700:
                  return ''
              prompt = (
                  'Summarize ONLY the article text below in 4 factual sentences. '
                  'Do not add facts, dates, names, claims, or context that are not explicitly present. '
                  'If the text is insufficient, return exactly: INSUFFICIENT_SOURCE_TEXT. '
                  f'This topic is covered by {source_count} source(s). Plain English, no markdown.\n\n'
                  + article_text[:6500]
              )
              payload = json.dumps({
                  'model': 'openai',
                  'messages': [
                      {'role': 'system', 'content': 'Return only what is asked. Plain text, no markdown.'},
                      {'role': 'user', 'content': prompt}
                  ],
                  'max_tokens': 650,
                  'temperature': 0.2
              }).encode('utf-8')
              for attempt in range(2):
                  try:
                      req = urllib.request.Request(
                          'https://text.pollinations.ai/openai',
                          data=payload,
                          headers={'Content-Type': 'application/json', 'User-Agent': 'UAP-News-Bot/1.0'},
                          method='POST'
                      )
                      with urllib.request.urlopen(req, timeout=30) as r:
                          d = json.loads(r.read())
                          t = ((d.get('choices') or [{}])[0].get('message') or {}).get('content', '')
                          t = (t or '').strip()
                          if t == 'INSUFFICIENT_SOURCE_TEXT':
                              return ''
                          if len(t) >= 120:
                              return t
                  except Exception as e:
                      print(f'    AI attempt {attempt + 1} failed: {e}')
                      if attempt < 1:
                          time.sleep(2)
              return ''

          broad_queries = [
              'UAP UFO 2026', 'UFO sighting 2026', 'UAP disclosure 2026', 'UAP whistleblower 2026',
              'UAP government Pentagon 2026', 'UAP AARO NASA Congress 2026',
              'UFO crash retrieval nonhuman 2026', 'unidentified anomalous phenomena hearing 2026',
          ]
          sum_seen = set()
          sum_arts = []
          today_str = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          for q in broad_queries:
              for a in fetch_rss(q):
                  tl = a['title'].lower()
                  if tl in sum_seen:
                      continue
                  sum_seen.add(tl)
                  if len(sum_arts) < 50:
                      sum_arts.append(a)

          grouped_sum_arts = group_articles(sum_arts)
          print(f'Broad scan: {len(sum_arts)} articles, {len(grouped_sum_arts)} topics')

          summaries_map = {}
          ok = 0
          print('Generating source-grounded summaries...')
          for i, art in enumerate(grouped_sum_arts[:20]):
              text = fetch_article_text(art.get('link', ''))
              summary = ''
              source = 'article'
              if text:
                  if i > 0:
                      time.sleep(1)
                  summary = ai_summarize_article(art['title'], text, art.get('_mentions', 1))
              if not summary:
                  summary = fetch_og_desc(art.get('link', ''))
                  source = 'meta'
              if summary:
                  summaries_map[art['id']] = summary
                  summaries_map[topic_id(art['title'])] = summary
                  for cluster_title in art.get('_clusterTitles', []):
                      summaries_map[topic_id(cluster_title)] = summary
                  ok += 1
                  print(f'  OK [{source}] {art["title"][:60]}')
              else:
                  print(f'  NO SOURCE TEXT {art["title"][:60]}')
          print(f'Summaries: {ok}/{min(len(grouped_sum_arts), 20)}')

          notif_cutoff = datetime.now(timezone.utc) - timedelta(hours=25)
          notif_seen = set()
          notif_pool = []

          for q in ['UAP UFO 2026', 'UFO sighting 2026', 'UAP disclosure 2026', 'UAP Pentagon whistleblower 2026']:
              for a in fetch_rss(q, cutoff=notif_cutoff):
                  tl = a['title'].lower()
                  if tl not in notif_seen:
                      notif_seen.add(tl)
                      notif_pool.append(a)

          grouped_notif_pool = group_articles(notif_pool)
          new_articles = [a for a in grouped_notif_pool if a['id'] not in notified_ids]
          print(f'Notification: {len(notif_pool)} articles, {len(grouped_notif_pool)} topics, {len(new_articles)} new')

          notif_data = {
              'timestamp': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'articles': [
                  {
                      'title': a['title'],
                      'source': a['source'],
                      'link': a.get('link', ''),
                      'date': today_str,
                      'summary': summaries_map.get(a['id'], ''),
                      'mentions': a.get('_mentions', 1),
                      'otherSources': a.get('_otherSources', []),
                      'clusterTitles': a.get('_clusterTitles', []),
                      'quality': a.get('_quality', 0),
                      'matchedTerms': a.get('_matchedTerms', []),
                  }
                  for a in new_articles[:10]
              ],
              'summaries': summaries_map,
              'scanMeta': {
                  'broadArticles': len(sum_arts),
                  'broadTopics': len(grouped_sum_arts),
                  'notificationArticles': len(notif_pool),
                  'notificationTopics': len(grouped_notif_pool),
                  'filters': 'UAP relevance plus entertainment/gaming/fiction exclusion',
              }
          }
          with open('latest-news.json', 'w', encoding='utf-8') as f:
              json.dump(notif_data, f, ensure_ascii=False, indent=2)
          print(f'latest-news.json: {len(new_articles[:10])} notification topics, {len(summaries_map)} summary keys')

          if new_articles:
              new_ids = list(notified_ids | {a['id'] for a in new_articles})[-500:]
              with open(SEEN_FILE, 'w') as f:
                  json.dump(new_ids, f)
              print(f'Saved seen IDs: {len(new_ids)}')

          if not new_articles:
              print('No new topics - no notification.')
              exit(0)

          if not NTFY_TOPIC:
              print('No NTFY_TOPIC - notification skipped.')
              exit(0)

          count = min(len(new_articles), 10)
          payload = json.dumps({
              'topic': NTFY_TOPIC,
              'title': f'UAP NEWS - {count} neue Meldung{"en" if count > 1 else ""}',
              'message': new_articles[0]['title'] + (f'\n+ {count-1} weitere Themen' if count > 1 else ''),
              'priority': 3,
              'tags': ['flying_saucer'],
              'click': 'https://cpg23.github.io/UAP/?notif=1',
          }).encode('utf-8')
          try:
              req = urllib.request.Request(
                  'https://ntfy.sh', data=payload,
                  headers={'Content-Type': 'application/json', 'User-Agent': 'UAP-News-Bot/1.0'},
                  method='POST'
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f'Notification sent (HTTP {r.status})')
          except Exception as e:
              print(f'ntfy error, scan remains successful: {e}')
          PYEOF

      - name: Publish latest-news.json
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp latest-news.json /tmp/latest-news.json
          for attempt in 1 2 3; do
            echo "Publish attempt $attempt"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/latest-news.json latest-news.json
            git add latest-news.json
            if git diff --staged --quiet; then
              echo "No changes."
              exit 0
            fi
            git commit -m "chore: update latest-news.json"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed, retrying after remote update..."
            sleep $((attempt * 5))
          done
          echo "Could not publish latest-news.json after retries."
          exit 1
