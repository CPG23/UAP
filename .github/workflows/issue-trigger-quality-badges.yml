name: Install Quality Badges Once

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  install:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || contains(github.event.issue.title, 'INSTALL_QUALITY_BADGES')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install quality badges
        run: node .github/scripts/install-quality-badges.js

      - name: Commit changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: show scan quality signals in article cards"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Close trigger issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: gh issue close "$ISSUE_URL" --comment "Quality badges installed."
