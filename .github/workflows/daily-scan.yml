name: Daily UAP Scan & Notify

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-uap-scan-main
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore seen-IDs cache
        uses: actions/cache@v4
        with:
          path: .seen-ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: |
            seen-ids-

      - name: Scan UAP news, group topics, generate grounded summaries & send ntfy notification
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 .github/scripts/daily_scan.py

      - name: Publish latest-news.json
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp latest-news.json /tmp/latest-news.json
          for attempt in 1 2 3; do
            echo "Publish attempt $attempt"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/latest-news.json latest-news.json
            git add latest-news.json .seen-ids.json
            if git diff --staged --quiet; then
              echo "No changes."
              exit 0
            fi
            git commit -m "chore: update latest-news.json"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed, retrying after remote update..."
            sleep $((attempt * 5))
          done
          echo "Could not publish latest-news.json after retries."
          exit 1
