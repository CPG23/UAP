name: Refresh latest-news fast once

on:
  push:
    paths:
      - '.github/workflows/refresh-latest-news-fast-once.yml'
      - '.github/scripts/refresh-latest-news-fast.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-latest-news-fast-once-main
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build latest-news.json
        run: python3 .github/scripts/refresh-latest-news-fast.py
      - name: Publish latest-news.json
        run: |
          if git diff --quiet -- latest-news.json; then
            echo "No latest-news changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest-news.json
          git commit -m "chore: refresh latest news feed"
          git pull --rebase origin main
          git push origin HEAD:main
