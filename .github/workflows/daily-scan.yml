name: Daily UAP Scan & Notify

on:
  schedule:
    - cron: '0 5 * * *'   # täglich 07:00 MESZ — primär
    - cron: '0 6 * * *'   # täglich 08:00 MESZ — Fallback falls primär übersprungen
    - cron: '0 13 * * *'  # täglich 15:00 MESZ — Nachmittags-Refresh für neue Artikel
  workflow_dispatch:        # manueller Start über GitHub UI möglich

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore seen-IDs cache
        uses: actions/cache@v4
        with:
          path: .seen-ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: |
            seen-ids-

      - name: Scan UAP news, generate summaries & send ntfy notification
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, time, urllib.request, urllib.parse
          from datetime import datetime, timedelta, timezone
          from email.utils import parsedate_to_datetime
          from xml.etree import ElementTree as ET

          NTFY_TOPIC = os.environ.get('NTFY_TOPIC', '').strip()
          if not NTFY_TOPIC:
              print('NTFY_TOPIC nicht gesetzt – Scan ohne Benachrichtigung.')

          SEEN_FILE = '.seen-ids.json'
          try:
              with open(SEEN_FILE) as f:
                  notified_ids = set(json.load(f))
              print(f'seen-IDs geladen: {len(notified_ids)}')
          except Exception:
              notified_ids = set()
              print('Keine seen-IDs – starte frisch.')

          UAP_RE = re.compile(
              r'\b(uap|ufo|ufos|alien|aliens|extraterrestrial|unidentified|aerial|'
              r'phenomenon|phenomena|sighting|sightings|disclosure|whistleblower|'
              r'pentagon|crash.?retrieval|nonhuman|non.human|orb|havana|usos?)\b', re.I)

          def topic_id(title):
              words = re.sub(r'[^a-z0-9]', ' ', title.lower()).split()
              return '-'.join(sorted(w for w in words if len(w) > 3))

          def clean_title(t):
              t = re.sub(r'<!\[CDATA\[|\]\]>', '', t or '').strip()
              t = re.sub(r'\s+[-–]\s+\S.{1,45}$', '', t).strip()
              return t

          def fetch_rss(query, cutoff=None):
              results = []
              try:
                  q   = urllib.parse.quote(query)
                  url = f'https://news.google.com/rss/search?q={q}&hl=en-US&gl=US&ceid=US:en'
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=20) as r:
                      xml = r.read().decode('utf-8', errors='replace')
                  root = ET.fromstring(xml)
                  for item in root.findall('.//item'):
                      title_el = item.find('title')
                      if title_el is None:
                          continue
                      title = clean_title(title_el.text)
                      if not title:
                          continue
                      if cutoff is not None:
                          pd_el = item.find('pubDate')
                          if pd_el is not None and pd_el.text:
                              try:
                                  pub_dt = parsedate_to_datetime(pd_el.text.strip())
                                  if pub_dt.tzinfo is None:
                                      pub_dt = pub_dt.replace(tzinfo=timezone.utc)
                                  if pub_dt < cutoff:
                                      continue
                              except Exception:
                                  pass
                      src_el  = item.find('source')
                      link_el = item.find('link')
                      link = (link_el.get('href') or link_el.text or '').strip() if link_el is not None else ''
                      source = (src_el.text or 'UAP News').strip() if src_el is not None else 'UAP News'
                      results.append({'title': title, 'source': source, 'link': link})
              except Exception as e:
                  print(f'RSS-Fehler "{query}": {e}')
              return results

          def fetch_og_desc(url):
              if not url or 'news.google.com' in url:
                  return ''
              try:
                  req = urllib.request.Request(url, headers={
                      'User-Agent': 'Mozilla/5.0 (compatible; UAP-Bot/1.0)',
                      'Accept': 'text/html,application/xhtml+xml'
                  })
                  with urllib.request.urlopen(req, timeout=8) as r:
                      html = r.read(80000).decode('utf-8', errors='replace')
                  m = (re.search(r'property=["\']og:description["\'][^>]+content=["\']([^"\']{80,})["\']', html, re.I)
                    or re.search(r'content=["\']([^"\']{80,})["\'][^>]*property=["\']og:description["\']', html, re.I)
                    or re.search(r'name=["\']description["\'][^>]+content=["\']([^"\']{80,})["\']', html, re.I))
                  if m:
                      t = re.sub(r'\s+', ' ', m.group(1)).strip()
                      if len(t) >= 80 and not re.search(r'google news|nachrichten aus aller welt|zusammengetragen', t, re.I):
                          return t[:520]
              except Exception:
                  pass
              return ''

          def ai_summarize(title):
              prompt = '5-sentence factual summary, English, plain text only: ' + title
              payload = json.dumps({
                  'model': 'openai',
                  'messages': [
                      {'role': 'system', 'content': 'You are a helpful assistant. Return only what is asked, plain text, no markdown.'},
                      {'role': 'user', 'content': prompt}
                  ],
                  'max_tokens': 650,
                  'temperature': 0.3
              }).encode('utf-8')
              for attempt in range(3):
                  try:
                      req = urllib.request.Request(
                          'https://text.pollinations.ai/openai',
                          data=payload,
                          headers={'Content-Type': 'application/json', 'User-Agent': 'UAP-News-Bot/1.0'},
                          method='POST'
                      )
                      with urllib.request.urlopen(req, timeout=35) as r:
                          d = json.loads(r.read())
                          t = ((d.get('choices') or [{}])[0].get('message') or {}).get('content', '')
                          t = (t or '').strip()
                          if len(t) >= 60:
                              return t
                  except Exception as e:
                      if attempt < 2:
                          time.sleep(3)
                      else:
                          print(f'    KI-Fehler (3 Versuche): {e}')
              return ''

          # ── 1. BROAD SCAN: 8 queries, gleich wie App ──────────────────────
          broad_queries = [
              'UAP UFO 2026', 'UFO sighting 2026', 'UAP alien disclosure 2026', 'UFO news 2026',
              'UAP whistleblower 2026', 'UFO witness encounter 2026',
              'UAP government Pentagon 2026', 'UFO crash retrieval nonhuman 2026',
          ]
          sum_seen  = set()
          sum_arts  = {}   # tid -> {'title':..., 'source':..., 'link':...}
          today_str = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          for q in broad_queries:
              for a in fetch_rss(q):
                  tl = a['title'].lower()
                  if tl in sum_seen or not UAP_RE.search(a['title']):
                      continue
                  sum_seen.add(tl)
                  tid = topic_id(a['title'])
                  if tid not in sum_arts and len(sum_arts) < 40:
                      sum_arts[tid] = a

          print(f'Broad scan: {len(sum_arts)} einzigartige UAP-Artikel')

          # ── 2. GENERATE SUMMARIES FOR ALL ─────────────────────────────────
          summaries_map = {}
          ok = 0
          print(f'Generiere Zusammenfassungen...')
          for i, (tid, art) in enumerate(sum_arts.items()):
              # Try og:description first (free, no rate limits, better quality)
              s = fetch_og_desc(art.get('link', ''))
              src = 'meta'
              if not s:
                  if i > 0:
                      time.sleep(1)
                  s = ai_summarize(art['title'])
                  src = 'AI'
              if s:
                  summaries_map[tid] = s
                  ok += 1
                  print(f'  ✓ [{src}] {art["title"][:60]}')
              else:
                  print(f'  ✗ {art["title"][:60]}')
          print(f'Zusammenfassungen: {ok}/{len(sum_arts)}')

          # ── 3. NOTIFICATION: which articles are new? ──────────────────────
          notif_cutoff = datetime.now(timezone.utc) - timedelta(hours=25)
          notif_seen   = set()
          notif_pool   = []

          for q in ['UAP UFO 2026', 'UFO sighting 2026', 'UAP disclosure 2026', 'UAP Pentagon whistleblower 2026']:
              for a in fetch_rss(q, cutoff=notif_cutoff):
                  tl = a['title'].lower()
                  if tl not in notif_seen:
                      notif_seen.add(tl)
                      notif_pool.append(a)

          new_articles = [a for a in notif_pool if topic_id(a['title']) not in notified_ids]
          print(f'Notification: {len(notif_pool)} Artikel gecheckt, {len(new_articles)} neu')

          # ── 4. WRITE latest-news.json ──────────────────────────────────────
          notif_data = {
              'timestamp': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'articles':  [
                  {
                      'title':   a['title'],
                      'source':  a['source'],
                      'link':    a.get('link', ''),
                      'date':    today_str,
                      'summary': summaries_map.get(topic_id(a['title']), ''),
                  }
                  for a in new_articles
              ],
              'summaries': summaries_map,
          }
          with open('latest-news.json', 'w', encoding='utf-8') as f:
              json.dump(notif_data, f, ensure_ascii=False, indent=2)
          print(f'latest-news.json: {len(new_articles)} Notif-Artikel, {len(summaries_map)} Zusammenfassungen')

          # ── 5. UPDATE seen-IDs ─────────────────────────────────────────────
          if new_articles:
              new_ids = list(notified_ids | {topic_id(a['title']) for a in new_articles})
              new_ids = new_ids[-500:]
              with open(SEEN_FILE, 'w') as f:
                  json.dump(new_ids, f)
              print(f'seen-IDs: {len(new_ids)} gespeichert')

          # ── 6. NTFY NOTIFICATION ───────────────────────────────────────────
          if not new_articles:
              print('Keine neuen Artikel – keine Benachrichtigung.')
              exit(0)

          if not NTFY_TOPIC:
              print('Kein NTFY_TOPIC – Benachrichtigung übersprungen.')
              exit(0)

          count = len(new_articles)
          payload = json.dumps({
              'topic':    NTFY_TOPIC,
              'title':    f'UAP NEWS — {count} neue Meldung{"en" if count > 1 else ""}',
              'message':  new_articles[0]['title'] + (f'\n+ {count-1} weitere' if count > 1 else ''),
              'priority': 3,
              'tags':     ['flying_saucer'],
              'click':    'https://cpg23.github.io/UAP/?notif=1',
          }).encode('utf-8')
          try:
              req = urllib.request.Request(
                  'https://ntfy.sh', data=payload,
                  headers={'Content-Type': 'application/json', 'User-Agent': 'UAP-News-Bot/1.0'},
                  method='POST'
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f'Benachrichtigung gesendet (HTTP {r.status})')
          except Exception as e:
              print(f'ntfy-Fehler: {e}')
          PYEOF

      - name: Publish latest-news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-news.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "chore: update latest-news.json"
            git pull --rebase origin main
            git push origin main
          fi
