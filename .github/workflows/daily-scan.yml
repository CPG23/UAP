name: Daily UAP Scan & Notify

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/scripts/daily_scan.py
      - .github/workflows/daily-scan.yml

permissions:
  contents: write

concurrency:
  group: daily-uap-scan-main
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore seen-IDs cache
        uses: actions/cache@v4
        with:
          path: .seen-ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: |
            seen-ids-

      - name: Scan UAP news and prepare exact notification payload
        env:
          NTFY_TOPIC: UAP-News26
        run: |
          echo "Running refreshed UAP scan"
          python3 - << 'PYEOF'
          from pathlib import Path
          p = Path('.github/scripts/daily_scan.py')
          s = p.read_text(encoding='utf-8')
          s = s.replace('grouped_all[:24]', 'grouped_all')
          p.write_text(s, encoding='utf-8')
          PYEOF
          python3 .github/scripts/daily_scan.py
          python3 - << 'PYEOF'
          import json
          from pathlib import Path

          path = Path('latest-news.json')
          data = json.loads(path.read_text(encoding='utf-8'))

          def needs_repair(text):
              text = (text or '').lower()
              return (
                  not text
                  or 'full article text could not be reliably extracted' in text
                  or 'keine belastbare zusammenfassung' in text
              )

          def phrase_terms(terms):
              terms = [str(t).strip() for t in (terms or []) if str(t).strip()]
              if not terms:
                  return ''
              if len(terms) == 1:
                  return terms[0]
              return ', '.join(terms[:-1]) + ' and ' + terms[-1]

          def grounded_summary(article):
              title = article.get('title') or 'this report'
              source = article.get('source') or 'the listed source'
              date = article.get('date') or data.get('timestamp', '')[:10]
              terms = phrase_terms(article.get('matchedTerms') or [])
              clusters = [t for t in (article.get('clusterTitles') or []) if t and t != title][:3]
              mentions = int(article.get('mentions') or 1)

              sentences = [
                  f'This item tracks a {source} report dated {date}.',
                  f'The listed headline centers on: "{title}".',
              ]
              if terms:
                  sentences.append(f'The scanner connects the topic with {terms}, based on the headline and available feed text.')
              if clusters:
                  sentences.append('Related feed headlines in the same topic cluster mention: ' + '; '.join(f'"{c}"' for c in clusters) + '.')
              if mentions > 1:
                  sentences.append(f'The topic is currently represented by {mentions} linked sources, so it receives an additional source-count signal in the app rating.')
              else:
                  sentences.append('At the moment the topic is represented by one linked source in the feed.')
              sentences.append('The summary is limited to verified feed metadata when the publisher article text cannot be safely extracted, so it does not add unsupported details.')
              return ' '.join(sentences)

          changed = False
          summaries = data.setdefault('summaries', {})
          for article in data.get('articles') or []:
              aid = article.get('id')
              if needs_repair(article.get('summary')):
                  article['summary'] = grounded_summary(article)
                  changed = True
              if aid and needs_repair(summaries.get(aid)):
                  summaries[aid] = article.get('summary') or grounded_summary(article)
                  changed = True

          if changed:
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding='utf-8')
              print('Repaired fallback summaries with grounded feed summaries.')
          else:
              print('Summaries already look usable.')
          PYEOF

      - name: Publish latest-news.json
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp latest-news.json /tmp/latest-news.json
          cp .seen-ids.json /tmp/.seen-ids.json 2>/dev/null || true
          for attempt in 1 2 3; do
            echo "Publish attempt $attempt"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/latest-news.json latest-news.json
            cp /tmp/.seen-ids.json .seen-ids.json 2>/dev/null || true
            git add latest-news.json .seen-ids.json
            if git diff --staged --quiet; then
              echo "No changes."
              exit 0
            fi
            git commit -m "chore: update latest-news.json"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed, retrying after remote update..."
            sleep $((attempt * 5))
          done
          echo "Could not publish latest-news.json after retries."
          exit 1

      - name: Send push notification after publish
        if: ${{ hashFiles('ntfy-payload.json') != '' }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request
          with open('ntfy-payload.json', encoding='utf-8') as f:
              payload = json.load(f)
          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(
              'https://ntfy.sh',
              data=data,
              headers={'Content-Type': 'application/json', 'User-Agent': 'UAP-News-Bot/1.0'},
              method='POST',
          )
          with urllib.request.urlopen(req, timeout=15) as r:
              print(f'Notification sent after publish (HTTP {r.status})')
          PYEOF
