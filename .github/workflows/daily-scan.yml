name: Daily UAP Scan & Notify

on:
  schedule:
    - cron: '0 7 * * *'   # täglich 07:00 UTC (= 08:00 / 09:00 MEZ/MESZ)
  workflow_dispatch:        # manueller Start über GitHub UI möglich

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Scan UAP news & send ntfy notification
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request, urllib.parse
          from datetime import datetime, timedelta, timezone
          from email.utils import parsedate_to_datetime
          from xml.etree import ElementTree as ET

          NTFY_TOPIC = os.environ.get('NTFY_TOPIC', '').strip()
          if not NTFY_TOPIC:
              print('NTFY_TOPIC secret nicht gesetzt – Benachrichtigung übersprungen.')
              exit(0)

          queries = [
              'UAP UFO 2026',
              'UFO sighting 2026',
              'UAP disclosure 2026',
              'UAP Pentagon whistleblower 2026',
          ]

          cutoff      = datetime.now(timezone.utc) - timedelta(hours=25)
          seen_titles = set()
          new_articles = []

          def clean_title(t):
              t = re.sub(r'<!\[CDATA\[|\]\]>', '', t or '').strip()
              t = re.sub(r'\s+[-–]\s+\S.{1,45}$', '', t).strip()
              return t

          for query in queries:
              try:
                  q   = urllib.parse.quote(query)
                  url = f'https://news.google.com/rss/search?q={q}&hl=en-US&gl=US&ceid=US:en'
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=20) as r:
                      xml = r.read().decode('utf-8', errors='replace')

                  root = ET.fromstring(xml)
                  for item in root.findall('.//item'):
                      title_el   = item.find('title')
                      pubdate_el = item.find('pubDate')
                      source_el  = item.find('source')
                      link_el    = item.find('link')

                      if title_el is None:
                          continue
                      title = clean_title(title_el.text)
                      if not title or title.lower() in seen_titles:
                          continue

                      if pubdate_el is not None and pubdate_el.text:
                          try:
                              pub_dt = parsedate_to_datetime(pubdate_el.text.strip())
                              if pub_dt.tzinfo is None:
                                  pub_dt = pub_dt.replace(tzinfo=timezone.utc)
                              if pub_dt < cutoff:
                                  continue
                          except Exception:
                              pass

                      seen_titles.add(title.lower())
                      link = ''
                      if link_el is not None:
                          link = (link_el.get('href') or link_el.text or '').strip()
                      source = (source_el.text or 'UAP News').strip() if source_el is not None else 'UAP News'
                      new_articles.append({'title': title, 'source': source, 'link': link})

              except Exception as e:
                  print(f'Fehler bei "{query}": {e}')

          if not new_articles:
              print('Keine neuen UAP-Artikel in den letzten 24 Stunden.')
              exit(0)

          count = len(new_articles)
          notif_title = f'UAP NEWS — {count} neue Meldung{"en" if count > 1 else ""}'
          body = new_articles[0]["title"]
          if count > 1:
              body += f'\n+ {count - 1} weitere Meldung{"en" if count > 2 else ""}'

          payload = json.dumps({
              'topic':    NTFY_TOPIC,
              'title':    notif_title,
              'message':  body,
              'priority': 3,
              'tags':     ['flying_saucer'],
              'click':    'https://cpg23.github.io/UAP/',
          }).encode('utf-8')

          req = urllib.request.Request(
              'https://ntfy.sh',
              data=payload,
              headers={'Content-Type': 'application/json', 'User-Agent': 'UAP-News-Bot/1.0'},
              method='POST'
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f'Benachrichtigung gesendet (HTTP {r.status}): {count} Artikel')
                  for a in new_articles[:5]:
                      print(f'  – {a["title"]} [{a["source"]}]')
          except Exception as e:
              print(f'Fehler beim Senden: {e}')
              exit(1)
          PYEOF
