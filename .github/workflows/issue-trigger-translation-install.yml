name: Issue-trigger translation install

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  install:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.title, 'INSTALL_GOOGLE_TRANSLATE_DIRECT')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install direct Google Translate
        run: node .github/scripts/install-google-translate-direct.js

      - name: Publish app patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js
          if git diff --staged --quiet; then
            echo "No app changes."
          else
            git commit -m "fix: install Google Translate directly in app"
            git push origin main
          fi

      - name: Close trigger issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Direct Google Translate install workflow has run.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
