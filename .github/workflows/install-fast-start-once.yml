name: Install fast app start once

on:
  push:
    paths:
      - '.github/workflows/install-fast-start-once.yml'
      - '.github/scripts/install-fast-start.js'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-fast-start-once-main
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install fast app start patch
        run: node .github/scripts/install-fast-start.js
      - name: Publish index.html
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "fix: make app start immediately"
          git pull --rebase origin main
          git push origin HEAD:main
