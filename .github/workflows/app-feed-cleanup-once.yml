name: App feed cleanup once

on:
  push:
    paths:
      - '.github/scripts/app-feed-cleanup.js'
      - '.github/workflows/app-feed-cleanup-once.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: app-feed-cleanup-once-main
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply app feed cleanup
        run: node .github/scripts/app-feed-cleanup.js
      - name: Publish cleanup
        run: |
          set -euo pipefail
          if git diff --quiet -- index.html .github/workflows/daily-scan.yml sw.js; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/daily-scan.yml sw.js
          git commit -m "feat: refine feed reading experience"
          git pull --rebase origin main
          git push origin HEAD:main
