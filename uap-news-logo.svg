<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 230" role="img" aria-labelledby="title desc">
  <title id="title">UAP News</title>
  <desc id="desc">UAP News logo with a connected signal line below the wordmark.</desc>
  <defs>
    <filter id="softGlow" x="-12%" y="-40%" width="124%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur1"/>
      <feFlood flood-color="#00d4ff" flood-opacity="0.42" result="cyan"/>
      <feComposite in="cyan" in2="blur1" operator="in" result="glow1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur2"/>
      <feFlood flood-color="#00ffdd" flood-opacity="0.18" result="aqua"/>
      <feComposite in="aqua" in2="blur2" operator="in" result="glow2"/>
      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="tailGrad" x1="32" y1="0" x2="928" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0.06"/>
      <stop offset="0.12" stop-color="#00d4ff" stop-opacity="0.62"/>
      <stop offset="0.62" stop-color="#cfffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <g filter="url(#softGlow)">
    <path d="M 928 178 H 36" fill="none" stroke="url(#tailGrad)" stroke-width="24" stroke-linecap="round"/>
    <text x="34" y="138" font-family="Rajdhani, 'Arial Narrow', Arial, sans-serif" font-size="126" font-weight="800" letter-spacing="8" fill="#fbfeff" stroke="#d8ffff" stroke-width="1.2">UAP News</text>
  </g>
</svg>
