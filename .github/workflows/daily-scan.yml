name: Daily UAP Scan & Notify

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/scripts/daily_scan.py
      - .github/scripts/split_unrelated_sources.py
      - .github/scripts/enrich_summaries.py
      - .github/scripts/enrich_source_dates.py
      - .github/scripts/sync_summaries.py
      - .github/scripts/source_quality_adjust.py
      - .github/scripts/regroup_topics.py
      - .github/scripts/normalize_feed_clusters.py
      - .github/scripts/dedupe_feed_titles.py
      - .github/scripts/balance_feed_quality.py
      - .github/scripts/repair_article_summaries.py
      - .github/scripts/summary_quality_gate.py
      - .github/scripts/final_feed_integrity.py
      - .github/scripts/finalize_app_feed.py
      - .github/scripts/separate_sighting_file_releases.py
      - .github/scripts/consolidate_file_release_clusters.py
      - .github/scripts/final_cluster_guard.py
      - .github/scripts/filter_unreachable_articles.py
      - .github/scripts/preserve_retained_app_articles.py
      - .github/scripts/fix_war_release_summary.py
      - .github/scripts/final_sync_visible_summaries.py
      - .github/scripts/backfill_related_sources.py
      - .github/scripts/mark_new_sources.py
      - .github/scripts/normalize_new_markers.py
      - .github/scripts/finalize_new_events.py
      - .github/scripts/precompute_translations.py
      - .github/scripts/prepare_ntfy_payload.py
      - .github/workflows/daily-scan.yml

permissions:
  contents: write

concurrency:
  group: daily-uap-scan-main
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install article extraction dependencies
        run: |
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet googlenewsdecoder==0.1.7 trafilatura==1.12.2

      - name: Restore seen-IDs cache
        uses: actions/cache@v4
        with:
          path: .seen-ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: |
            seen-ids-

      - name: Scan UAP news and prepare exact notification payload
        env:
          NTFY_TOPIC: UAP-News26
        run: |
          echo "Running refreshed UAP scan with final notification validation"
          echo "Manual refresh trigger: 2026-05-31T21:06:00+02:00"
          cp latest-news.json previous-latest-news.json 2>/dev/null || true
          python3 .github/scripts/daily_scan.py
          python3 .github/scripts/split_unrelated_sources.py
          python3 .github/scripts/enrich_summaries.py
          python3 .github/scripts/sync_summaries.py
          python3 .github/scripts/source_quality_adjust.py
          python3 .github/scripts/regroup_topics.py
          python3 .github/scripts/normalize_feed_clusters.py
          python3 .github/scripts/dedupe_feed_titles.py
          python3 .github/scripts/balance_feed_quality.py
          python3 .github/scripts/repair_article_summaries.py
          python3 .github/scripts/summary_quality_gate.py
          python3 .github/scripts/final_feed_integrity.py
          python3 .github/scripts/finalize_app_feed.py
          python3 .github/scripts/separate_sighting_file_releases.py
          python3 .github/scripts/fix_war_release_summary.py
          python3 .github/scripts/final_sync_visible_summaries.py
          python3 .github/scripts/backfill_related_sources.py
          python3 .github/scripts/consolidate_file_release_clusters.py
          python3 .github/scripts/final_cluster_guard.py
          python3 .github/scripts/separate_sighting_file_releases.py
          python3 .github/scripts/fix_war_release_summary.py
          python3 .github/scripts/final_cluster_guard.py
          python3 .github/scripts/filter_unreachable_articles.py
          python3 .github/scripts/preserve_retained_app_articles.py
          python3 .github/scripts/repair_article_summaries.py
          python3 .github/scripts/summary_quality_gate.py
          python3 .github/scripts/final_sync_visible_summaries.py
          python3 .github/scripts/enrich_source_dates.py
          python3 .github/scripts/mark_new_sources.py
          python3 .github/scripts/normalize_new_markers.py
          python3 .github/scripts/finalize_new_events.py
          python3 .github/scripts/precompute_translations.py
          python3 .github/scripts/prepare_ntfy_payload.py

      - name: Publish latest-news.json
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp latest-news.json /tmp/latest-news.json
          cp app-feed-archive.json /tmp/app-feed-archive.json 2>/dev/null || true
          cp .seen-ids.json /tmp/.seen-ids.json 2>/dev/null || true
          cp ntfy-payload.json /tmp/ntfy-payload.json 2>/dev/null || true
          for attempt in 1 2 3; do
            echo "Publish attempt $attempt"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/latest-news.json latest-news.json
            cp /tmp/app-feed-archive.json app-feed-archive.json 2>/dev/null || true
            cp /tmp/.seen-ids.json .seen-ids.json 2>/dev/null || true
            cp /tmp/ntfy-payload.json ntfy-payload.json 2>/dev/null || rm -f ntfy-payload.json
            git add latest-news.json
            if [ -f app-feed-archive.json ]; then git add app-feed-archive.json; fi
            if [ -f .seen-ids.json ]; then git add .seen-ids.json; fi
            if [ -f ntfy-payload.json ]; then
              git add ntfy-payload.json
            else
              git rm -f --ignore-unmatch ntfy-payload.json
            fi
            if git diff --staged --quiet; then
              echo "No changes."
              exit 0
            fi
            git commit -m "chore: update latest-news.json"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed, retrying after remote update..."
            sleep $((attempt * 5))
          done
          echo "Could not publish latest-news.json after retries."
          exit 1

      - name: Send push notification after publish
        if: ${{ hashFiles('ntfy-payload.json') != '' }}
        run: |
          python3 << 'PYEOF'
          import json, time, urllib.request

          APP_FEED = 'https://cpg23.github.io/UAP/latest-news.json'
          with open('latest-news.json', encoding='utf-8') as f:
              local_feed = json.load(f)
          with open('ntfy-payload.json', encoding='utf-8') as f:
              payload = json.load(f)

          expected_timestamp = local_feed.get('timestamp')
          expected_ids = set((local_feed.get('notificationBatch') or {}).get('ids') or [])

          def published_feed_is_ready():
              url = APP_FEED + '?verify=' + str(int(time.time()))
              req = urllib.request.Request(url, headers={'Cache-Control': 'no-cache', 'User-Agent': 'UAP-News-Bot/1.0'})
              with urllib.request.urlopen(req, timeout=15) as r:
                  feed = json.load(r)
              if expected_timestamp and feed.get('timestamp') != expected_timestamp:
                  return False
              article_ids = {item.get('id') for item in feed.get('articles') or [] if isinstance(item, dict)}
              batch_ids = set((feed.get('notificationBatch') or {}).get('ids') or [])
              return expected_ids <= article_ids and expected_ids <= batch_ids

          for attempt in range(24):
              try:
                  if published_feed_is_ready():
                      print(f'Published app feed is ready after {attempt + 1} check(s).')
                      break
              except Exception as exc:
                  print(f'Published app feed not ready yet: {str(exc)[:120]}')
              time.sleep(10)
          else:
              print('Skipping push: published app feed did not expose the notified article IDs in time.')
              raise SystemExit(0)

          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(
              'https://ntfy.sh',
              data=data,
              headers={'Content-Type': 'application/json', 'User-Agent': 'UAP-News-Bot/1.0'},
              method='POST',
          )
          with urllib.request.urlopen(req, timeout=15) as r:
              print(f'Notification sent after publish (HTTP {r.status})')
          PYEOF
