name: Install Source List Display Once

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/scripts/install-source-list-display.js'
      - '.github/workflows/install-source-list-display-once.yml'
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install source list display
        run: node .github/scripts/install-source-list-display.js

      - name: Commit changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: show complete source lists on article cards"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
