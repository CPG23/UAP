name: UAP News Daily Push

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 09:00 CET / 08:00 UTC+1
  workflow_dispatch:      # Manual trigger for testing

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch UAP news and send push via ntfy.sh
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC secret not configured — skipping."
            exit 0
          fi

          python3 << 'EOF'
import os, re, json, urllib.request
from datetime import datetime, timezone, timedelta
from email.utils import parsedate_to_datetime

ntfy_topic = os.environ.get('NTFY_TOPIC', '').strip()
if not ntfy_topic:
    print("No topic, exiting.")
    exit(0)

url = "https://news.google.com/rss/search?q=UAP+UFO+2026&hl=en-US&gl=US&ceid=US:en"
req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0 UAP-Notifier/1.0"})
try:
    with urllib.request.urlopen(req, timeout=25) as r:
        xml = r.read().decode("utf-8", errors="replace")
except Exception as e:
    print(f"RSS fetch failed: {e}")
    exit(1)

items = re.findall(r"<item>(.*?)</item>", xml, re.DOTALL)
cutoff = datetime.now(timezone.utc) - timedelta(hours=25)
articles = []

for item in items[:15]:
    title_m = re.search(r"<title>(?:<!\[CDATA\[)?(.*?)(?:\]\]>)?</title>", item)
    pd_m    = re.search(r"<pubDate>(.*?)</pubDate>", item)
    if not title_m or not pd_m:
        continue
    title = title_m.group(1).strip()
    # Clean up Google News source suffix
    title = re.sub(r'\s+[-–]\s+[^-–]{2,50}$', '', title).strip()
    try:
        pub_date = parsedate_to_datetime(pd_m.group(1).strip())
        if pub_date.tzinfo is None:
            pub_date = pub_date.replace(tzinfo=timezone.utc)
        if pub_date < cutoff:
            continue
    except Exception:
        continue
    articles.append(title)

if not articles:
    print("No new articles in the last 25 hours.")
    exit(0)

count = len(articles)
plural = "en" if count > 1 else ""
notif_title = f"UAP NEWS — {count} neue Meldung{plural}"
body = articles[0]
if count > 1:
    extra = count - 1
    body += f"\n+ {extra} weitere Meldung{'en' if extra > 1 else ''}"

print(f"Sending: {notif_title}")
print(f"Body: {body}")

push_req = urllib.request.Request(
    f"https://ntfy.sh/{ntfy_topic}",
    data=body.encode("utf-8"),
    method="POST",
    headers={
        "Title": notif_title,
        "Priority": "default",
        "Tags": "flying_saucer",
        "Content-Type": "text/plain; charset=utf-8"
    }
)
with urllib.request.urlopen(push_req, timeout=15) as resp:
    print(f"ntfy response: {resp.status}")
EOF
