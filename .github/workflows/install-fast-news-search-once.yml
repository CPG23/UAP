name: Install fast news search once

on:
  push:
    paths:
      - '.github/workflows/install-fast-news-search-once.yml'
      - '.github/scripts/install-fast-news-search.js'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-fast-news-search-once-main
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install fast multi-source news search
        run: node .github/scripts/install-fast-news-search.js
      - name: Publish app files
        run: |
          if git diff --quiet -- index.html sw.js; then
            echo "No app changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js
          git commit -m "fix: speed up article discovery"
          git pull --rebase origin main
          git push origin HEAD:main
